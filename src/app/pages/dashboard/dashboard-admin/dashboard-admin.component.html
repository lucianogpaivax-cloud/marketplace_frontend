<div class="dashboard-container">

  <h1>Painel do Administrador</h1>

  <div class="cards-grid">

    <!-- Card: Listar seller -->
    <mat-card class="dashboard-card" routerLink="/admin/sellers">
      <mat-card-header>
        <mat-icon mat-card-avatar>storefront</mat-icon>
        <mat-card-title>seller</mat-card-title>
        <mat-card-subtitle>Gerenciar seller cadastrados</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p>Veja e remova seller da plataforma.</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-raised-button color="primary">Listar seller</button>
      </mat-card-actions>
    </mat-card>

    <!-- Card: Listar customers -->
    <mat-card class="dashboard-card" routerLink="/admin/customers">
      <mat-card-header>
        <mat-icon mat-card-avatar>people</mat-icon>
        <mat-card-title>customers</mat-card-title>
        <mat-card-subtitle>Gerenciar customers cadastrados</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p>Acesse a lista completa de customers registrados.</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-raised-button color="accent">Listar customers</button>
      </mat-card-actions>
    </mat-card>

  </div>
</div>
