<div class="dashboard-container">

  <h1>Painel do Seller</h1>

  <div class="cards-grid">

    <!-- Card: Dados da Loja -->
    <mat-card class="dashboard-card">
      <mat-card-header>
        <mat-icon mat-card-avatar>store</mat-icon>
        <mat-card-title>Dados da Loja</mat-card-title>
        <mat-card-subtitle>
          Visualize e edite as informações da sua loja
        </mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <p>
          Nome da loja, tipo de loja e origem cadastrados no sistema.
        </p>
      </mat-card-content>

      <mat-card-actions>
        <button
          mat-raised-button
          color="primary"
          routerLink="/seller/edit"
        >
          Editar dados da loja
        </button>
      </mat-card-actions>
    </mat-card>

    <!-- Card: Produtos -->
    <mat-card class="dashboard-card">
      <mat-card-header>
        <mat-icon mat-card-avatar>inventory_2</mat-icon>
        <mat-card-title>Produtos</mat-card-title>
        <mat-card-subtitle>
          Gerencie os produtos da sua loja
        </mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <p>
          Crie, edite e visualize os produtos cadastrados.
        </p>
      </mat-card-content>

      <mat-card-actions>
        <button
          mat-raised-button
          color="primary"
          routerLink="/seller/products"
        >
          Meus produtos
        </button>

        <button
          mat-button
          color="primary"
          routerLink="/seller/products/create"
        >
          Criar produto
        </button>
      </mat-card-actions>
    </mat-card>

  </div>
</div>
