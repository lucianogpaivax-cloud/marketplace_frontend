<div class="dashboard-container">

  <h1>Painel do seller</h1>

  <div class="cards-grid">

    <!-- Card: Meus Dados -->
    <mat-card class="dashboard-card">
      <mat-card-header>
        <mat-icon mat-card-avatar>store</mat-icon>
        <mat-card-title>Dados da Loja</mat-card-title>
        <mat-card-subtitle>Visualize e edite as informações da sua loja</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <p>
          Nome da loja, tipo de loja e origem cadastrados no sistema.
        </p>
      </mat-card-content>

      <mat-card-actions>
        <button
          mat-raised-button
          color="primary"
          routerLink="/seller/edit"
        >
          Editar dados da loja
        </button>
      </mat-card-actions>
    </mat-card>

  </div>
</div>
