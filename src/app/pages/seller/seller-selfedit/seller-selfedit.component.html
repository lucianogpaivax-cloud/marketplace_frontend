<div class="edit-wrapper">

  <mat-card class="edit-card">

    <h2 class="title">Editar meus dados (seller)</h2>

    <form (ngSubmit)="updateSeller()" class="form-grid">

      <div *ngIf="seller">

        <!-- Dados do usuário -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nome</mat-label>
          <input matInput [(ngModel)]="user.name" name="name">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput [(ngModel)]="user.email" name="email">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Telefone</mat-label>
          <input matInput [(ngModel)]="user.telefone" name="telefone">
        </mat-form-field>

        <!-- Dados da loja -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nome da Loja</mat-label>
          <input matInput [(ngModel)]="seller.nome_loja" name="nome_loja">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Tipo da Loja</mat-label>
          <input matInput [(ngModel)]="seller.tipo_loja" name="tipo_loja">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Origem</mat-label>
          <input matInput [(ngModel)]="seller.origem" name="origem">
        </mat-form-field>

      </div>

      <div class="button-container">
        <button mat-flat-button color="primary" type="submit">
          Salvar alterações
        </button>
      </div>

    </form>

  </mat-card>

</div>
