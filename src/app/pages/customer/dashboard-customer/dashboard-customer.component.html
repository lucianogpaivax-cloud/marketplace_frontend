<div class="dashboard-container">

  <h1>Meu Painel</h1>

  <div class="cards-grid">

    <!-- Card: Meus Dados -->
    <mat-card class="dashboard-card">
      <mat-card-header>
        <mat-icon mat-card-avatar>person</mat-icon>
        <mat-card-title>Meus Dados</mat-card-title>
        <mat-card-subtitle>Visualize e edite suas informações</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <p>
          Nome, email, CPF e endereço cadastrados no sistema.
        </p>
      </mat-card-content>

      <mat-card-actions>
        <button
          mat-raised-button
          color="primary"
          routerLink="/customer/edit"
        >
          Editar meus dados
        </button>
      </mat-card-actions>
    </mat-card>

  </div>
</div>
